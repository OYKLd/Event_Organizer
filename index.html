<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiseur d'Événements</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Organiseur d'Événements</h1>
            <button class="btn btn-primary" id="addEventBtn">+ Ajouter un événement</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Filtres -->
            <section class="filters">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Tous</button>
                    <button class="filter-btn" data-filter="upcoming">À venir</button>
                    <button class="filter-btn" data-filter="past">Passés</button>
                </div>
                <div class="sort-group">
                    <label for="sortSelect">Trier par:</label>
                    <select id="sortSelect">
                        <option value="date-asc">Date (croissant)</option>
                        <option value="date-desc">Date (décroissant)</option>
                        <option value="name">Nom</option>
                    </select>
                </div>
            </section>

            <!-- Liste des événements -->
            <section class="events-section">
                <div class="events-grid" id="eventsGrid">
                    <!-- Les événements seront ajoutés dynamiquement ici -->
                </div>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📅</div>
                    <h3>Aucun événement</h3>
                    <p>Commencez par ajouter votre premier événement !</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal pour ajouter/modifier un événement -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ajouter un événement</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventTitle">Titre *</label>
                    <input type="text" id="eventTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="eventDate">Date *</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="eventTime">Heure *</label>
                        <input type="time" id="eventTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="eventLocation">Lieu *</label>
                    <input type="text" id="eventLocation" required>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Description</label>
                    <textarea id="eventDescription" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
